<!DOCTYPE html>
<html>
<head>
    <title>AI Log Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .summary {
            background: #020617;
            padding: 15px;
            margin-top: 20px;
            border-left: 5px solid cyan;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            border-left: 5px solid red;
        }

        .count {
            color: #38bdf8;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Upload Log File</h2>

<input type="file" id="fileInput">
<button onclick="analyze()">Analyze</button>

<div id="output"></div>

<script>

function analyze(){

    const file = document.getElementById("fileInput").files[0];

    if(!file){
        alert("Select file");
        return;
    }

    const formData = new FormData();
    formData.append("logfile", file);

    fetch("/analyze", {
        method:"POST",
        body: formData
    })
    .then(r=>r.json())
    .then(show);
}

function show(data){

    let html = `
    <div class="summary">
    Total Errors: ${data.total_errors}
    </div>
    `;

    data.analysis.forEach(x=>{
        html += `
        <div class="card">
        <b>Error:</b> ${x.error_line}<br>
        <b>Type:</b> ${x.type}<br>
        <span class="count">Occurrences: ${x.count}</span><br>
        <b>Cause:</b> ${x.cause}<br>
        <b>Fix:</b> ${x.fix}
        </div>`;
    });

    document.getElementById("output").innerHTML = html;
}

</script>
</body>
</html>
